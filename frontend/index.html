<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Agent AI — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-gray-900 text-white px-6 py-4">
        <div class="flex items-center justify-between">
            <a href="/dashboard" class="flex items-center gap-3 hover:opacity-80">
                <span class="text-2xl">🏠</span>
                <span class="font-bold text-lg">House Agent AI</span>
            </a>
            <!-- Desktop Nav -->
            <div class="hidden md:flex gap-6 text-sm">
                <a href="/dashboard" class="text-white font-semibold border-b-2 border-white pb-1">Dashboard</a>
                <a href="/tickets" class="text-gray-400 hover:text-white transition-colors">Tickets</a>
                <a href="/calendar" class="text-gray-400 hover:text-white transition-colors">Calendar</a>
            </div>
            <!-- Hamburger -->
            <button onclick="toggleMenu()" class="md:hidden p-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 focus:outline-none transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="md:hidden mt-3 border-t border-gray-700 pt-3" style="display:none;">
            <a href="/dashboard" class="flex items-center gap-2 px-3 py-2.5 rounded-lg bg-gray-800 text-white font-semibold text-sm mb-1">Dashboard</a>
            <a href="/tickets" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white text-sm mb-1 transition-colors">Tickets</a>
            <a href="/calendar" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white text-sm transition-colors">Calendar</a>
        </div>
    </nav>

    <!-- Main -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">

        <h1 class="text-xl sm:text-2xl font-bold text-gray-800 mb-6">Overview</h1>

        <!-- Stats Cards -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-3 sm:gap-4 mb-6 sm:mb-8" id="stats">
            <a href="/tickets?filter=all" class="bg-white rounded-xl shadow p-4 text-center cursor-pointer hover:shadow-md transition-shadow">
                <div class="text-3xl sm:text-4xl font-bold text-gray-800" id="stat-total">—</div>
                <div class="text-gray-500 text-xs sm:text-sm mt-1">Total Tickets</div>
            </a>
            <a href="/tickets?filter=open" class="bg-white rounded-xl shadow p-4 text-center cursor-pointer hover:shadow-md transition-shadow">
                <div class="text-3xl sm:text-4xl font-bold text-blue-500" id="stat-open">—</div>
                <div class="text-gray-500 text-xs sm:text-sm mt-1">Open</div>
            </a>
            <a href="/tickets?filter=urgent" class="bg-white rounded-xl shadow p-4 text-center cursor-pointer hover:shadow-md transition-shadow">
                <div class="text-3xl sm:text-4xl font-bold text-red-500" id="stat-urgent">—</div>
                <div class="text-gray-500 text-xs sm:text-sm mt-1">Urgent</div>
            </a>
            <a href="/tickets?filter=escalated" class="bg-white rounded-xl shadow p-4 text-center cursor-pointer hover:shadow-md transition-shadow">
                <div class="text-3xl sm:text-4xl font-bold text-orange-500" id="stat-escalated">—</div>
                <div class="text-gray-500 text-xs sm:text-sm mt-1">Escalated</div>
            </a>
            <a href="/tickets?filter=closed" class="bg-white rounded-xl shadow p-4 text-center cursor-pointer hover:shadow-md transition-shadow col-span-2 sm:col-span-1">
                <div class="text-3xl sm:text-4xl font-bold text-green-500" id="stat-closed">—</div>
                <div class="text-gray-500 text-xs sm:text-sm mt-1">Closed</div>
            </a>
        </div>

        <!-- Recent Tickets -->
        <div class="bg-white rounded-xl shadow">
            <div class="px-4 sm:px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                <h2 class="font-semibold text-gray-800">Recent Tickets</h2>
                <a href="/tickets" class="text-sm text-blue-500 hover:underline">View all →</a>
            </div>

            <!-- Mobile Cards -->
            <div id="tickets-cards" class="divide-y divide-gray-100 md:hidden"></div>

            <!-- Desktop Table -->
            <div class="hidden md:block overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
                        <tr>
                            <th class="px-6 py-3 text-left">Ticket ID</th>
                            <th class="px-6 py-3 text-left">Tenant</th>
                            <th class="px-6 py-3 text-left">Channel</th>
                            <th class="px-6 py-3 text-left">Status</th>
                            <th class="px-6 py-3 text-left">Priority</th>
                            <th class="px-6 py-3 text-left">Summary</th>
                            <th class="px-6 py-3 text-left">Created</th>
                        </tr>
                    </thead>
                    <tbody id="tickets-table" class="divide-y divide-gray-100">
                        <tr><td colspan="7" class="px-6 py-8 text-center text-gray-400">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/dashboard.js"></script>
    <script>
        function toggleMenu() {
            const m = document.getElementById('mobile-menu');
            m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }
    </script>
</body>
</html>
