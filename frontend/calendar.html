<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Agent AI — Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-gray-900 text-white px-6 py-4">
        <div class="flex items-center justify-between">
            <a href="/dashboard" class="flex items-center gap-3 hover:opacity-80">
                <span class="text-2xl">🏠</span>
                <span class="font-bold text-lg">House Agent AI</span>
            </a>
            <div class="hidden md:flex gap-6 text-sm">
                <a href="/dashboard" class="text-gray-400 hover:text-white transition-colors">Dashboard</a>
                <a href="/tickets" class="text-gray-400 hover:text-white transition-colors">Tickets</a>
                <a href="/calendar" class="text-white font-semibold border-b-2 border-white pb-1">Calendar</a>
            </div>
            <button onclick="toggleMenu()" class="md:hidden p-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 focus:outline-none transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>
        <div id="mobile-menu" class="md:hidden mt-3 border-t border-gray-700 pt-3" style="display:none;">
            <a href="/dashboard" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white text-sm mb-1 transition-colors">Dashboard</a>
            <a href="/tickets" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white text-sm mb-1 transition-colors">Tickets</a>
            <a href="/calendar" class="flex items-center gap-2 px-3 py-2.5 rounded-lg bg-gray-800 text-white font-semibold text-sm transition-colors">Calendar</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">

        <div class="flex items-start justify-between mb-6 gap-4">
            <div>
                <h1 class="text-xl sm:text-2xl font-bold text-gray-800">Calendar</h1>
                <p class="text-xs sm:text-sm text-gray-400 mt-1">View repair appointments and manage your availability</p>
            </div>
            <button onclick="showBlockForm()" class="shrink-0 bg-gray-900 text-white px-4 py-2 rounded-lg text-sm hover:bg-gray-700 whitespace-nowrap">
                + Block a Date
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

            <!-- Calendar Grid -->
            <div class="lg:col-span-2 bg-white rounded-xl shadow">
                <div class="flex items-center justify-between px-4 sm:px-6 py-4 border-b">
                    <button onclick="prevMonth()" class="text-gray-400 hover:text-gray-700 text-xl px-2">&#8592;</button>
                    <h2 id="calendar-title" class="font-bold text-gray-800 text-sm sm:text-base"></h2>
                    <button onclick="nextMonth()" class="text-gray-400 hover:text-gray-700 text-xl px-2">&#8594;</button>
                </div>

                <div class="grid grid-cols-7 border-b">
                    <div class="text-xs font-semibold text-gray-400 text-center py-2">Sun</div>
                    <div class="text-xs font-semibold text-gray-400 text-center py-2">Mon</div>
                    <div class="text-xs font-semibold text-gray-400 text-center py-2">Tue</div>
                    <div class="text-xs font-semibold text-gray-400 text-center py-2">Wed</div>
                    <div class="text-xs font-semibold text-gray-400 text-center py-2">Thu</div>
                    <div class="text-xs font-semibold text-gray-400 text-center py-2">Fri</div>
                    <div class="text-xs font-semibold text-gray-400 text-center py-2">Sat</div>
                </div>

                <div id="calendar-grid" class="grid grid-cols-7"></div>

                <div class="flex gap-4 px-4 sm:px-6 py-3 border-t text-xs text-gray-500">
                    <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-blue-400 inline-block"></span> Repair</span>
                    <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-red-400 inline-block"></span> Blocked</span>
                    <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-gray-800 inline-block"></span> Today</span>
                </div>
            </div>

            <!-- Right Panel -->
            <div class="flex flex-col gap-6">

                <!-- Block Form -->
                <div id="block-form" class="hidden bg-white rounded-xl shadow p-5">
                    <h3 class="font-bold text-gray-800 mb-4">Block a Date</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Date</label>
                            <input id="block-date-input" type="date"
                                class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Reason</label>
                            <input id="block-reason-input" type="text" placeholder="e.g. Holiday, Personal"
                                class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400">
                        </div>
                        <div class="flex gap-2 pt-1">
                            <button onclick="hideBlockForm()" class="flex-1 px-3 py-2 text-sm text-gray-600 border rounded-lg hover:bg-gray-50">Cancel</button>
                            <button onclick="submitBlock()" class="flex-1 px-3 py-2 text-sm bg-gray-900 text-white rounded-lg hover:bg-gray-700">Block</button>
                        </div>
                    </div>
                </div>

                <!-- Upcoming Events -->
                <div class="bg-white rounded-xl shadow">
                    <div class="px-4 sm:px-5 py-4 border-b">
                        <h3 class="font-bold text-gray-800">Upcoming (30 days)</h3>
                    </div>
                    <div id="events-list" class="divide-y divide-gray-100 max-h-96 overflow-y-auto">
                        <div class="px-5 py-4 text-sm text-gray-400">Loading...</div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Day Detail Panel -->
        <div id="day-panel" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4">
            <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md">
                <div class="flex items-center justify-between px-4 sm:px-6 py-4 border-b">
                    <h2 id="day-panel-title" class="font-bold text-gray-800 text-sm sm:text-base"></h2>
                    <button onclick="closeDayPanel()" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
                </div>
                <div id="day-panel-content" class="px-4 sm:px-6 py-4 space-y-3 max-h-80 overflow-y-auto"></div>
            </div>
        </div>

    </main>

    <script src="/static/js/api.js"></script>
    <script>
        let allEvents = [];
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();

        const MONTHS = ["January","February","March","April","May","June",
                        "July","August","September","October","November","December"];

        function toggleMenu() {
            const m = document.getElementById('mobile-menu');
            m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }

        function dateStr(date) {
            return date.toISOString().split('T')[0];
        }

        function eventsByDate(dateString) {
            return allEvents.filter(e => (e.start || '').startsWith(dateString));
        }

        function renderCalendar() {
            document.getElementById('calendar-title').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
            const grid = document.getElementById('calendar-grid');
            const today = dateStr(new Date());
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

            let html = '';
            for (let i = 0; i < firstDay; i++) {
                html += `<div class="h-12 sm:h-16 border-b border-r border-gray-50"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const ds = `${currentYear}-${String(currentMonth + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const dayEvents = eventsByDate(ds);
                const isToday = ds === today;
                const hasRepair = dayEvents.some(e => e.type === 'repair');
                const hasBlock = dayEvents.some(e => e.type === 'blocked');

                html += `
                    <div class="h-12 sm:h-16 border-b border-r border-gray-50 p-1 cursor-pointer hover:bg-gray-50 ${isToday ? 'bg-gray-50' : ''}"
                         onclick="showDayPanel('${ds}')">
                        <div class="flex justify-center mb-1">
                            <span class="text-xs font-medium ${isToday ? 'bg-gray-900 text-white w-5 h-5 rounded-full flex items-center justify-center' : 'text-gray-600'}">
                                ${day}
                            </span>
                        </div>
                        <div class="flex gap-1 justify-center flex-wrap">
                            ${hasRepair ? '<span class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-blue-400 inline-block"></span>' : ''}
                            ${hasBlock ? '<span class="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-red-400 inline-block"></span>' : ''}
                        </div>
                    </div>
                `;
            }

            grid.innerHTML = html;
        }

        function showDayPanel(dateString) {
            const dayEvents = eventsByDate(dateString);
            const formatted = new Date(dateString + 'T00:00:00').toLocaleDateString('en-GB', {
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
            });
            document.getElementById('day-panel-title').textContent = formatted;

            if (dayEvents.length === 0) {
                document.getElementById('day-panel-content').innerHTML =
                    '<p class="text-gray-400 text-sm">No events on this day.</p>';
            } else {
                document.getElementById('day-panel-content').innerHTML = dayEvents.map(e => `
                    <div class="p-3 rounded-lg ${e.type === 'blocked' ? 'bg-red-50 border border-red-100' : 'bg-blue-50 border border-blue-100'}">
                        <div class="flex items-center justify-between mb-1">
                            <span class="text-xs font-semibold ${e.type === 'blocked' ? 'text-red-600' : 'text-blue-600'}">
                                ${e.type === 'blocked' ? '🔴 Blocked' : '🔵 Repair Appointment'}
                            </span>
                            ${e.type === 'blocked' ? `
                                <button onclick="unblockEvent('${e.id}')" class="text-xs text-red-400 hover:underline">Remove</button>
                            ` : ''}
                        </div>
                        <p class="text-sm text-gray-700 font-medium">${e.summary}</p>
                        ${e.description ? `<p class="text-xs text-gray-500 mt-1">${e.description}</p>` : ''}
                    </div>
                `).join('');
            }

            document.getElementById('day-panel').classList.remove('hidden');
        }

        function closeDayPanel() {
            document.getElementById('day-panel').classList.add('hidden');
        }

        async function loadEvents() {
            try {
                const res = await fetch('/api/calendar/events');
                const data = await res.json();
                allEvents = data.events || [];
                renderCalendar();
                renderEventsList();
            } catch (e) {
                document.getElementById('events-list').innerHTML =
                    '<div class="px-5 py-4 text-sm text-red-400">Failed to load events.</div>';
            }
        }

        function renderEventsList() {
            const list = document.getElementById('events-list');
            if (allEvents.length === 0) {
                list.innerHTML = '<div class="px-5 py-4 text-sm text-gray-400">No upcoming events.</div>';
                return;
            }
            list.innerHTML = allEvents.map(e => {
                const start = e.start ? new Date(e.start) : null;
                const dateLabel = start ? start.toLocaleDateString('en-GB', {
                    weekday: 'short', day: 'numeric', month: 'short'
                }) : '—';
                const timeLabel = e.start && e.start.includes('T') ? start.toLocaleTimeString('en-GB', {
                    hour: '2-digit', minute: '2-digit'
                }) : 'All day';

                return `
                    <div class="px-4 sm:px-5 py-3 flex items-start gap-3">
                        <div class="w-2 h-2 rounded-full mt-1.5 shrink-0 ${e.type === 'blocked' ? 'bg-red-400' : 'bg-blue-400'}"></div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-800 truncate">${e.summary}</p>
                            <p class="text-xs text-gray-400">${dateLabel} · ${timeLabel}</p>
                        </div>
                        ${e.type === 'blocked' ? `
                            <button onclick="unblockEvent('${e.id}')" class="text-xs text-red-400 hover:underline shrink-0">Remove</button>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        function showBlockForm() {
            document.getElementById('block-form').classList.remove('hidden');
            document.getElementById('block-date-input').value = dateStr(new Date());
            document.getElementById('block-reason-input').value = '';
        }

        function hideBlockForm() {
            document.getElementById('block-form').classList.add('hidden');
        }

        async function submitBlock() {
            const date = document.getElementById('block-date-input').value;
            const reason = document.getElementById('block-reason-input').value.trim() || 'Unavailable';
            if (!date) { alert('Please select a date.'); return; }

            await fetch('/api/calendar/block', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date, reason })
            });

            hideBlockForm();
            await loadEvents();
        }

        async function unblockEvent(eventId) {
            if (!confirm('Remove this blocked date?')) return;
            await fetch(`/api/calendar/block/${eventId}`, { method: 'DELETE' });
            closeDayPanel();
            await loadEvents();
        }

        function prevMonth() {
            currentMonth--;
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            renderCalendar();
        }

        loadEvents();
    </script>
</body>
</html>
