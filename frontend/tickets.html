<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Agent AI — Tickets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-gray-900 text-white px-6 py-4">
        <div class="flex items-center justify-between">
            <a href="/dashboard" class="flex items-center gap-3 hover:opacity-80">
                <span class="text-2xl">🏠</span>
                <span class="font-bold text-lg">House Agent AI</span>
            </a>
            <div class="hidden md:flex gap-6 text-sm">
                <a href="/dashboard" class="text-gray-400 hover:text-white transition-colors">Dashboard</a>
                <a href="/tickets" class="text-white font-semibold border-b-2 border-white pb-1">Tickets</a>
                <a href="/calendar" class="text-gray-400 hover:text-white transition-colors">Calendar</a>
            </div>
            <button onclick="toggleMenu()" class="md:hidden p-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 focus:outline-none transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>
        <div id="mobile-menu" class="md:hidden mt-3 border-t border-gray-700 pt-3" style="display:none;">
            <a href="/dashboard" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white text-sm mb-1 transition-colors">Dashboard</a>
            <a href="/tickets" class="flex items-center gap-2 px-3 py-2.5 rounded-lg bg-gray-800 text-white font-semibold text-sm mb-1">Tickets</a>
            <a href="/calendar" class="flex items-center gap-2 px-3 py-2.5 rounded-lg text-gray-400 hover:bg-gray-800 hover:text-white text-sm transition-colors">Calendar</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl sm:text-2xl font-bold text-gray-800" id="tickets-heading">All Tickets</h1>
            <a href="/tickets" id="clear-filter" class="hidden text-sm text-blue-500 hover:underline">Clear filter ×</a>
        </div>

        <div class="bg-white rounded-xl shadow">
            <!-- Mobile Cards -->
            <div id="tickets-cards" class="divide-y divide-gray-100 md:hidden">
                <div class="px-4 py-8 text-center text-gray-400 text-sm">Loading...</div>
            </div>

            <!-- Desktop Table -->
            <div class="hidden md:block overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
                        <tr>
                            <th class="px-6 py-3 text-left">Ticket ID</th>
                            <th class="px-6 py-3 text-left">Tenant</th>
                            <th class="px-6 py-3 text-left">Channel</th>
                            <th class="px-6 py-3 text-left">Status</th>
                            <th class="px-6 py-3 text-left">Priority</th>
                            <th class="px-6 py-3 text-left">Summary</th>
                            <th class="px-6 py-3 text-left">Created</th>
                        </tr>
                    </thead>
                    <tbody id="tickets-body" class="divide-y divide-gray-100">
                        <tr><td colspan="7" class="px-6 py-10 text-center text-gray-400">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Ticket Detail Modal -->
    <div id="ticket-modal" class="hidden fixed inset-0 bg-black bg-opacity-40 z-50 overflow-y-auto" onclick="closeModal()">
        <div class="min-h-full flex items-start sm:items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl my-4" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between px-4 sm:px-6 py-4 border-b">
                <h2 class="font-bold text-gray-800">Ticket <span id="modal-ticket-id" class="font-mono text-sm text-gray-500"></span></h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
            </div>
            <div class="px-4 sm:px-6 py-4 grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm border-b">
                <div><span class="text-gray-400">Tenant</span><div class="font-medium mt-1" id="modal-tenant"></div></div>
                <div><span class="text-gray-400">Channel</span><div class="font-medium mt-1" id="modal-channel"></div></div>
                <div><span class="text-gray-400">Status</span><div class="mt-1" id="modal-status"></div></div>
                <div><span class="text-gray-400">Priority</span><div class="mt-1" id="modal-priority"></div></div>
                <div class="sm:col-span-2"><span class="text-gray-400">Summary</span><div class="font-medium mt-1" id="modal-summary"></div></div>
                <div><span class="text-gray-400">Created</span><div class="text-gray-500 mt-1 text-xs" id="modal-created"></div></div>
            </div>
            <!-- Update Status -->
            <div class="px-4 sm:px-6 py-4 border-t border-gray-100">
                <h3 class="font-semibold text-gray-700 mb-3">Update Status</h3>
                <div class="flex gap-3">
                    <select id="modal-status-select" class="flex-1 border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400">
                        <option value="open">Open</option>
                        <option value="closed">Closed</option>
                        <option value="escalated">Escalated</option>
                        <option value="resolved">Resolved</option>
                    </select>
                    <button id="save-status-btn" type="button" class="bg-gray-900 text-white px-4 py-2 rounded-lg text-sm hover:bg-gray-700 touch-manipulation">
                        Save
                    </button>
                </div>
                <p id="status-update-msg" class="text-xs mt-2 hidden"></p>
            </div>

            <div class="px-4 sm:px-6 py-4 border-t border-gray-100">
                <h3 class="font-semibold text-gray-700 mb-3">Message History</h3>
                <div id="modal-messages"></div>
            </div>
        </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/tickets.js"></script>
    <script>
        function toggleMenu() {
            const m = document.getElementById('mobile-menu');
            m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }
        document.getElementById('save-status-btn').addEventListener('touchend', function(e) {
            e.preventDefault();
            updateTicketStatus();
        });
        document.getElementById('save-status-btn').addEventListener('click', function(e) {
            updateTicketStatus();
        });
    </script>
</body>
</html>
